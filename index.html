<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini Brawl Ultra - Professional Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0f1115;
            color: #f5f6fa; font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden; touch-action: none; user-select: none;
            -webkit-user-select: none;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 100vh; box-sizing: border-box; padding-top: 10px;
        }
        
        /* 📱 核心結構優化：包裹整個遊戲，嚴格限制最大闊度，防止 iPad 爆版 */
        #game-wrapper {
            width: 100%; max-width: 820px;
            display: flex; flex-direction: column; align-items: center;
        }

        #game-container { 
            position: relative; 
            width: 100%;
            border: 4px solid #2f3640; 
            background-color: #1e272e; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
        }
        
        canvas { display: block; width: 100%; height: auto; }

        /* 👑 頂部 UI：整合數字血條 */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 12px 20px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0)); pointer-events: none;
            z-index: 5;
        }
        .player-hud { width: 42%; }
        .hud-meta { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .bar-container { 
            width: 100%; height: 20px; background: #222; border: 2px solid #fff; 
            border-radius: 6px; overflow: hidden; margin-top: 4px; position: relative;
        }
        .bar-back { position: absolute; top:0; left:0; height:100%; background: #e84118; width: 100%; transition: width 0.3s ease-out; }
        .bar-front { position: absolute; top:0; left:0; height:100%; width: 100%; }
        #p1-health { background: linear-gradient(90deg, #4cd137, #44bd32); }
        #p2-health { background: linear-gradient(90deg, #00a8ff, #0097e6); float: right; }
        .weapon-tag { color: #fbc531; }

        /* ⚔️ 高級武器詳細設定選單 */
        #weapon-select-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 17, 21, 0.97); z-index: 20; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .select-row { display: flex; gap: 30px; margin: 15px; }
        .player-box { background: #1e272e; padding: 20px; border-radius: 12px; border: 2px solid #485460; width: 230px; text-align: left; }
        .player-box h3 { margin: 0 0 10px 0; font-size: 20px; text-align: center; font-weight: 900; }
        .weapon-btn { 
            width: 100%; padding: 10px; margin: 8px 0; cursor: pointer; 
            background: #2f3542; color: white; border: 2px solid transparent; border-radius: 8px; 
            text-align: left; transition: all 0.2s;
        }
        .weapon-btn .w-name { font-weight: bold; font-size: 15px; display: block; color: #fff; }
        .weapon-btn .w-desc { font-size: 11px; color: #a4b0be; display: block; margin-top: 2px; }
        .weapon-btn.selected { background: #e84118; border-color: #f5f6fa; box-shadow: 0 0 12px rgba(232,65,24,0.4); }
        #start-game-btn { 
            padding: 14px 60px; font-size: 22px; font-weight: 900; background: #4cd137; color: white; 
            border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 15px rgba(76,209,55,0.4);
        }

        /* 📱 徹底修正排版：操控區移到畫布下方，不再重疊，預留足夠手部空間 */
        #touch-controls { 
            width: 100%; height: 160px; margin-top: 15px;
            position: relative; display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; padding: 0 10px; pointer-events: auto;
        }
        
        .joystick-container { position: relative; width: 120px; height: 120px; }
        .joystick-zone { width: 100%; height: 100%; background: rgba(255,255,255,0.06); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); position: relative; }
        .joystick-knob { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 33px; left: 33px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); border: 1px solid #fff; }
        
        .action-zone { display: flex; gap: 15px; align-items: center; }

        /* ⏳ 按鈕設計與 CD 遮罩效果 */
        .btn-wrapper { position: relative; width: 64px; height: 64px; }
        .btn { 
            width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); 
            font-size: 15px; font-weight: 900; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.4); 
            position: relative; overflow: hidden;
        }
        .btn-red { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .btn-yellow { background: linear-gradient(135deg, #ffa502, #eccc68); color: #1e272e; }
        
        /* CD 圓形數值遮罩 */
        .cd-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: bold; pointer-events: none;
            opacity: 0; transition: opacity 0.1s;
        }
        .cd-overlay.active { opacity: 1; }

        /* 🏁 遊戲結束彈窗 */
        #game-over-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(15,17,21,0.92); z-index:15; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="weapon-select-screen">
                <h2 style="font-size: 28px; color: #fbc531; margin: 0 0 5px 0; font-weight:900;">⚔️ MINI BRAWL ULTRA v4.0 ⚔️</h2>
                <p style="color: #718093; font-size:13px; margin: 0 0 10px 0;">已優化：修正排版・實時數值血條・大招冷卻系統</p>
                
                <div class="select-row">
                    <div class="player-box" id="p1-select">
                        <h3 style="color: #4cd137;">PLAYER 1 (左)</h3>
                        <button class="weapon-btn selected" onclick="selectWeapon(1, 'sword')">
                            <span class="w-name">🗡️ 巨刃大劍</span>
                            <span class="w-desc">傷害: 10 | 距離: 85px | 大招CD: 3秒</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(1, 'spear')">
                            <span class="w-name">🔱 風暴長槍</span>
                            <span class="w-desc">傷害: 7 | 距離: 145px | 大招CD: 4.5秒</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(1, 'dagger')">
                            <span class="w-name">🩸 劇毒匕首</span>
                            <span class="w-desc">傷害: 5 | 距離: 55px | 大招CD: 1.5秒</span>
                        </button>
                    </div>
                    <div class="player-box" id="p2-select">
                        <h3 style="color: #00a8ff;">PLAYER 2 (右)</h3>
                        <button class="weapon-btn selected" onclick="selectWeapon(2, 'sword')">
                            <span class="w-name">🗡️ 巨刃大劍</span>
                            <span class="w-desc">傷害: 10 | 距離: 85px | 大招CD: 3秒</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(2, 'spear')">
                            <span class="w-name">🔱 風暴長槍</span>
                            <span class="w-desc">傷害: 7 | 距離: 145px | 大招CD: 4.5秒</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(2, 'dagger')">
                            <span class="w-name">🩸 劇毒匕首</span>
                            <span class="w-desc">傷害: 5 | 距離: 55px | 大招CD: 1.5秒</span>
                        </button>
                    </div>
                </div>
                <button id="start-game-btn" onclick="startGame()">⚔️ 進入競技場 ⚔️</button>
            </div>

            <div id="ui">
                <div class="player-hud">
                    <div class="hud-meta"><span style="color:#4cd137;">P1 <span id="p1-w-tag" class="weapon-tag"></span></span><span id="p1-hp-text">100 / 100</span></div>
                    <div class="bar-container">
                        <div id="p1-health-back" class="bar-back"></div>
                        <div id="p1-health" class="bar-front"></div>
                    </div>
                </div>
                <div class="player-hud" style="text-align: right;">
                    <div class="hud-meta"><span id="p2-hp-text">100 / 100</span><span style="color:#00a8ff;"><span id="p2-w-tag" class="weapon-tag"></span> P2</span></div>
                    <div class="bar-container">
                        <div id="p2-health-back" class="bar-back"></div>
                        <div id="p2-health" class="bar-front"></div>
                    </div>
                </div>
            </div>

            <canvas id="gameCanvas" width="800" height="380"></canvas>

            <div id="game-over-screen" class="hidden">
                <h1 id="winner-text" style="font-size:34px; color:#fbc531; font-weight:900;"></h1>
                <button id="start-game-btn" onclick="resetToSelect()">🔄 重新選角戰鬥</button>
            </div>
        </div>

        <div id="touch-controls">
            <div class="joystick-container">
                <div class="joystick-zone" id="p1-joystick-zone"><div class="joystick-knob" id="p1-knob"></div></div>
            </div>
            <div class="action-zone">
                <div class="btn-wrapper"><button class="btn btn-red" id="p1-btn-atk">ATK</button></div>
                <div class="btn-wrapper">
                    <button class="btn btn-yellow" id="p1-btn-skr">SKL</button>
                    <div class="cd-overlay" id="p1-skr-cd">0.0s</div>
                </div>
            </div>

            <div class="action-zone">
                <div class="btn-wrapper">
                    <button class="btn btn-yellow" id="p2-btn-skr">SKL</button>
                    <div class="cd-overlay" id="p2-skr-cd">0.0s</div>
                </div>
                <div class="btn-wrapper"><button class="btn btn-red" id="p2-btn-atk">ATK</button></div>
            </div>
            <div class="joystick-container">
                <div class="joystick-zone" id="p2-joystick-zone"><div class="joystick-knob" id="p2-knob"></div></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.55;

        // 📊 武器高階數據對照表
        const WEAPON_TYPES = {
            sword:  { name: "大劍", range: 85,  height: 50, damage: 10, cooldown: 180, skillCD: 3000,  fxColor: 'rgba(255, 255, 255, 0.55)' },
            spear:  { name: "長槍", range: 145, height: 22, damage: 7,  cooldown: 280, skillCD: 4500,  fxColor: 'rgba(230, 126, 34, 0.6)' },
            dagger: { name: "匕首", range: 55,  height: 45, damage: 5,  cooldown: 90,  skillCD: 1500,  fxColor: 'rgba(231, 76, 60, 0.65)' }
        };

        let gameOver = false;
        let screenShakeTime = 0, screenShakeIntensity = 0;
        let particles = [];

        // 🎇 受傷粒子類
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.color = color; this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.alpha -= this.decay; }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.restore(); }
        }

        // 🏃 戰鬥角色類
        class Fighter {
            constructor({ x, color, id, weaponType }) {
                this.id = id; this.x = x; this.y = 100;
                this.vx = 0; this.vy = 0;
                this.baseWidth = 42; this.baseHeight = 85;
                this.color = color; this.health = 100;
                this.facing = id === 1 ? 'right' : 'left';
                this.isAttacking = false; this.attackType = 'normal'; 
                this.flash = 0; this.scaleX = 1; this.scaleY = 1;
                
                // 技能 CD 狀態（時間戳記）
                this.nextSkillTime = 0; 

                this.setWeapon(weaponType);
            }

            setWeapon(type) {
                this.weapon = WEAPON_TYPES[type];
                this.attackBox = { width: this.weapon.range, height: this.weapon.height };
            }

            draw() {
                ctx.save();
                let centerX = this.x + this.baseWidth / 2;
                let centerY = this.y + this.baseHeight;
                ctx.translate(centerX, centerY);
                ctx.scale(this.scaleX, this.scaleY);

                ctx.fillStyle = this.flash > 0 && Math.floor(this.flash/2)%2===0 ? '#ffffff' : this.color;
                if(this.flash > 0) this.flash--;
                
                ctx.fillRect(-this.baseWidth/2, -this.baseHeight, this.baseWidth, this.baseHeight);
                ctx.fillStyle = '#0f1115';
                let eyeOffset = this.facing === 'right' ? 10 : -17;
                ctx.fillRect(eyeOffset, -this.baseHeight + 16, 7, 7);
                ctx.restore();

                if (this.isAttacking) {
                    ctx.save();
                    let ax = this.facing === 'right' ? this.x + this.baseWidth : this.x - this.attackBox.width;
                    let ay = this.y + 15;
                    let gradient = ctx.createLinearGradient(ax, ay, ax + this.attackBox.width, ay);
                    if (this.attackType === 'skill') {
                        gradient.addColorStop(0, 'rgba(155, 89, 182, 0.85)');
                        gradient.addColorStop(1, 'rgba(155, 89, 182, 0)');
                    } else {
                        gradient.addColorStop(this.facing === 'right' ? 0 : 1, this.weapon.fxColor);
                        gradient.addColorStop(this.facing === 'right' ? 1 : 0, 'rgba(255,255,255,0)');
                    }
                    ctx.fillStyle = gradient;
                    ctx.fillRect(ax, ay, this.attackBox.width, this.attackBox.height);
                    ctx.restore();
                }
            }

            update() {
                this.scaleX += (1 - this.scaleX) * 0.15;
                this.scaleY += (1 - this.scaleY) * 0.15;
                if (Math.abs(this.vx) > 0.5 && this.vy === 0) { this.scaleX = 1.04; this.scaleY = 0.96; }

                this.x += this.vx; this.y += this.vy;

                if (this.y + this.baseHeight + this.vy >= canvas.height - 35) {
                    if (this.vy > 2) { this.scaleX = 1.18; this.scaleY = 0.82; }
                    this.vy = 0; this.y = canvas.height - 35 - this.baseHeight;
                } else { this.vy += GRAVITY; }

                if (this.x < 0) this.x = 0;
                if (this.x + this.baseWidth > canvas.width) this.x = canvas.width - this.baseWidth;

                this.draw();
            }

            attack(type) {
                const now = Date.now();
                if (type === 'skill') {
                    // 檢查技能 CD 到了沒
                    if (now < this.nextSkillTime) return; 
                    this.nextSkillTime = now + this.weapon.skillCD;
                    startVisualCD(this.id, this.weapon.skillCD);
                }

                if (!this.isAttacking) {
                    this.isAttacking = true;
                    this.attackType = type;
                    this.scaleX = 1.15; this.scaleY = 0.9;
                    this.vx += this.facing === 'right' ? 5 : -5;

                    if(type === 'skill') { 
                        this.attackBox.width = this.weapon.range * 1.5; 
                        triggerScreenShake(10, 5);
                    } else { 
                        this.attackBox.width = this.weapon.range; 
                    }
                    setTimeout(() => { this.isAttacking = false; }, this.weapon.cooldown);
                }
            }
        }

        let player1, player2;
        let p1SelectedWeapon = 'sword', p2SelectedWeapon = 'sword';

        function selectWeapon(pId, type) {
            if(pId === 1) p1SelectedWeapon = type;
            else p2SelectedWeapon = type;
            event.currentTarget.parentNode.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function startGame() {
            document.getElementById('weapon-select-screen').classList.add('hidden');
            document.getElementById('p1-w-tag').innerText = `[${WEAPON_TYPES[p1SelectedWeapon].name}]`;
            document.getElementById('p2-w-tag').innerText = `[${WEAPON_TYPES[p2SelectedWeapon].name}]`;
            
            player1 = new Fighter({ x: 150, color: '#4cd137', id: 1, weaponType: p1SelectedWeapon });
            player2 = new Fighter({ x: 600, color: '#00a8ff', id: 2, weaponType: p2SelectedWeapon });
            
            gameOver = false; particles = [];
            document.getElementById('game-over-screen').classList.add('hidden');
            
            // 重置 CD 遮罩 UI
            document.getElementById('p1-skr-cd').classList.remove('active');
            document.getElementById('p2-skr-cd').classList.remove('active');

            updateHealthUI();
            animate();
        }

        // ⏱️ 處理畫面上圓形按鈕嘅 CD 倒數顯示
        function startVisualCD(playerId, cdDuration) {
            const overlay = document.getElementById(`p${playerId}-skr-cd`);
            overlay.classList.add('active');
            
            let timeLeft = cdDuration / 1000;
            overlay.innerText = timeLeft.toFixed(1) + 's';

            let cdInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(cdInterval);
                    overlay.classList.remove('active');
                } else {
                    overlay.innerText = timeLeft.toFixed(1) + 's';
                }
            }, 100);
        }

        function triggerScreenShake(duration, intensity) { screenShakeTime = duration; screenShakeIntensity = intensity; }
        function createHitExplosion(x, y, color) { for(let i=0; i<12; i++) { particles.push(new Particle(x, y, color)); } }

        function checkHit(att, def) {
            let ax = att.facing === 'right' ? att.x + att.baseWidth : att.x - att.attackBox.width;
            let ay = att.y + 15;
            return ( ax + att.attackBox.width >= def.x && ax <= def.x + def.baseWidth && ay + att.attackBox.height >= def.y && ay <= def.y + def.baseHeight );
        }

        // 👑 優化：實時數字血條更新
        function updateHealthUI() {
            let hp1 = Math.max(0, Math.ceil(player1.health));
            let hp2 = Math.max(0, Math.ceil(player2.health));

            document.getElementById('p1-hp-text').innerText = `${hp1} / 100`;
            document.getElementById('p2-hp-text').innerText = `${hp2} / 100`;

            document.getElementById('p1-health').style.width = hp1 + '%';
            document.getElementById('p2-health').style.width = hp2 + '%';
            
            setTimeout(() => {
                if(document.getElementById('p1-health-back')) {
                    document.getElementById('p1-health-back').style.width = hp1 + '%';
                    document.getElementById('p2-health-back').style.width = hp2 + '%';
                }
            }, 150);
        }

        function animate() {
            if (gameOver) return;
            window.requestAnimationFrame(animate);

            ctx.save();
            if (screenShakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * screenShakeIntensity, (Math.random() - 0.5) * screenShakeIntensity);
                screenShakeTime--;
            }

            // 漸變背景
            let bgGrd = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrd.addColorStop(0, '#14171c'); bgGrd.addColorStop(1, '#232731');
            ctx.fillStyle = bgGrd; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 地面
            ctx.fillStyle = '#4cd137'; ctx.fillRect(0, canvas.height - 35, canvas.width, 35); 
            ctx.fillStyle = '#44bd32'; ctx.fillRect(0, canvas.height - 35, canvas.width, 3); 

            // P1 搖桿行走與跳躍
            player1.vx = p1Joystick.dx * 5.5;
            if(p1Joystick.dx > 0.05) player1.facing = 'right';
            if(p1Joystick.dx < -0.05) player1.facing = 'left';
            if(p1Joystick.dy < -0.7 && player1.vy === 0) { player1.vy = -14; player1.scaleY = 1.2; player1.scaleX = 0.8; }

            // P2 搖桿行走與跳躍
            player2.vx = p2Joystick.dx * 5.5;
            if(p2Joystick.dx > 0.05) player2.facing = 'right';
            if(p2Joystick.dx < -0.05) player2.facing = 'left';
            if(p2Joystick.dy < -0.7 && player2.vy === 0) { player2.vy = -14; player2.scaleY = 1.2; player2.scaleX = 0.8; }

            player1.update();
            player2.update();

            // 傷害解算
            if (player1.isAttacking && checkHit(player1, player2)) {
                let isCrit = player1.attackType === 'skill';
                player2.health -= isCrit ? player1.weapon.damage * 2.5 : player1.weapon.damage;
                player2.flash = 12; player2.scaleX = 0.8; player2.scaleY = 1.15;
                triggerScreenShake(isCrit ? 12 : 5, isCrit ? 8 : 4);
                createHitExplosion(player2.x + 20, player2.y + 30, '#ff4757');
                updateHealthUI();
                player1.isAttacking = false;
                if(player2.health <= 0) endGame("PLAYER 1 (綠色) 贏了！");
            }
            
            if (player2.isAttacking && checkHit(player2, player1)) {
                let isCrit = player2.attackType === 'skill';
                player1.health -= isCrit ? player2.weapon.damage * 2.5 : player2.weapon.damage;
                player1.flash = 12; player1.scaleX = 0.8; player1.scaleY = 1.15;
                triggerScreenShake(isCrit ? 12 : 5, isCrit ? 8 : 4);
                createHitExplosion(player1.x + 20, player1.y + 30, '#ff4757');
                updateHealthUI();
                player2.isAttacking = false;
                if(player1.health <= 0) endGame("PLAYER 2 (藍色) 贏了！");
            }

            particles.forEach((p, idx) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(idx, 1); });
            ctx.restore();
        }

        function endGame(txt) { gameOver = true; document.getElementById('game-over-screen').classList.remove('hidden'); document.getElementById('winner-text').innerText = txt; }
        function resetToSelect() { document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('weapon-select-screen').classList.remove('hidden'); }

        // 🕹️ 多點觸控虛擬搖桿驅動類
        class TouchJoystick {
            constructor(zoneId, knobId) {
                this.zone = document.getElementById(zoneId); this.knob = document.getElementById(knobId);
                this.dx = 0; this.dy = 0; this.activeTouchId = null;
                this.init();
            }
            init() {
                this.zone.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.activeTouchId === null) { let touch = e.changedTouches[0]; this.activeTouchId = touch.identifier; this.handleMove(touch); }
                }, { passive: false });
                this.zone.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    for(let touch of e.touches) { if(touch.identifier === this.activeTouchId) { this.handleMove(touch); break; } }
                }, { passive: false });
                const stop = (e) => {
                    for(let touch of e.changedTouches) {
                        if(touch.identifier === this.activeTouchId) { this.activeTouchId = null; this.dx = 0; this.dy = 0; this.knob.style.transform = `translate(0px, 0px)`; break; }
                    }
                };
                this.zone.addEventListener('touchend', stop); this.zone.addEventListener('touchcancel', stop);
            }
            handleMove(touch) {
                let rect = this.zone.getBoundingClientRect();
                let deltaX = touch.clientX - (rect.left + rect.width / 2);
                let deltaY = touch.clientY - (rect.top + rect.height / 2);
                let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                let maxRadius = rect.width / 2 - 8;
                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; distance = maxRadius; }
                this.knob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                this.dx = deltaX / maxRadius; this.dy = deltaY / maxRadius;
            }
        }

        const p1Joystick = new TouchJoystick('p1-joystick-zone', 'p1-knob');
        const p2Joystick = new TouchJoystick('p2-joystick-zone', 'p2-knob');

        function bindActionButton(id, callback) {
            document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); callback(); }, { passive: false });
        }
        bindActionButton('p1-btn-atk', () => player1.attack('normal'));
        bindActionButton('p1-btn-skr', () => player1.attack('skill'));
        bindActionButton('p2-btn-atk', () => player2.attack('normal'));
        bindActionButton('p2-btn-skr', () => player2.attack('skill'));
    </script>
</body>
