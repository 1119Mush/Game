<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini Brawl Ultra - Stable Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0b0c10;
            color: #f5f6fa; font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; box-sizing: border-box;
        }
        
        #game-wrapper {
            width: 100%; max-width: 840px;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; box-sizing: border-box;
        }

        #game-container { 
            position: relative; width: 100%;
            border: 4px solid #1f242d; background-color: #1f272e; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.8); border-radius: 16px;
            overflow: hidden; aspect-ratio: 800 / 380;
        }
        
        canvas { display: block; width: 100%; height: 100%; }

        /* 👑 頂部 UI */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 10px 15px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0)); pointer-events: none; z-index: 5;
        }
        .player-hud { width: 40%; }
        .hud-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .bar-container { width: 100%; height: 16px; background: #222; border: 1.5px solid #fff; border-radius: 4px; overflow: hidden; margin-top: 3px; position: relative; }
        .bar-back { position: absolute; top:0; left:0; height:100%; background: #e84118; width: 100%; transition: width 0.3s ease-out; }
        .bar-front { position: absolute; top:0; left:0; height:100%; width: 100%; }
        #p1-health { background: linear-gradient(90deg, #4cd137, #44bd32); }
        #p2-health { background: linear-gradient(90deg, #00a8ff, #0097e6); float: right; }
        .state-tag { color: #fbc531; font-size: 11px; margin-left: 5px; font-weight: normal; }

        /* ⚔️ 武器選單佈局 */
        #weapon-select-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.98); z-index: 30;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 12px; box-sizing: border-box;
        }
        
        .select-main-area {
            display: flex; justify-content: space-between; align-items: stretch; width: 100%; flex-grow: 1; gap: 15px;
        }

        .player-box { 
            background: #15181f; padding: 8px 12px; border-radius: 10px; border: 2px solid #2f3640; 
            width: 42%; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; 
        }
        .player-box h3 { margin: 0 0 6px 0; font-size: 16px; text-align: center; font-weight: 900; }
        
        .weapon-btn { 
            width: 100%; padding: 5px 8px; margin: 3px 0; cursor: pointer; 
            background: #21252f; color: white; border: 2px solid transparent; border-radius: 6px; 
            text-align: left; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .weapon-btn .w-name { font-weight: bold; font-size: 12px; color: #f5f6fa; }
        .weapon-btn .w-desc { font-size: 9px; color: #9c88ff; margin-top: 1px; }
        .weapon-btn.selected { background: #e84118; border-color: #fff; box-shadow: 0 0 8px rgba(232,65,24,0.5); }
        
        /* 🎯 開始按鈕獨立核心區 */
        .center-action-box {
            width: 14%; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #start-game-btn { 
            width: 85px; height: 85px; border-radius: 50%; font-size: 16px; font-weight: 900; 
            background: linear-gradient(135deg, #4cd137, #44bd32); color: white; 
            border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 20px rgba(76,209,55,0.6);
            display: flex; align-items: center; justify-content: center; text-align: center;
            animation: pulse 1.5s infinite; z-index: 35;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 12px rgba(76,209,55,0.6); }
            50% { transform: scale(1.06); box-shadow: 0 0 22px rgba(76,209,55,0.9); }
            100% { transform: scale(1); box-shadow: 0 0 12px rgba(76,209,55,0.6); }
        }

        /* 📱 底部操控區 */
        #touch-controls { 
            width: 100%; height: 130px; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; padding: 0 5px;
        }
        #touch-controls.menu-active { pointer-events: none; opacity: 0.3; }

        .joystick-container { width: 100px; height: 100px; }
        .joystick-zone { width: 100%; height: 100%; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); position: relative; pointer-events: auto; }
        .joystick-knob { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.35); border-radius: 50%; top: 28px; left: 28px; border: 1px solid #fff; }
        .action-zone { display: flex; gap: 10px; align-items: center; pointer-events: auto; }
        .btn-wrapper { position: relative; width: 54px; height: 54px; }
        .btn { width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(255,255,255,0.7); font-size: 13px; font-weight: 900; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .btn-red { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .btn-yellow { background: linear-gradient(135deg, #ffa502, #eccc68); color: #1e272e; }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: bold; pointer-events: none; opacity: 0; }
        .cd-overlay.active { opacity: 1; }

        #game-over-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(11,12,16,0.95); z-index:15; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="weapon-select-screen">
                <h2 style="font-size: 18px; color: #fbc531; margin: 0 0 6px 0; font-weight:900; text-align:center; width:100%;">⚔️ MINI BRAWL ULTRA v5.2 ⚔️</h2>
                
                <div class="select-main-area">
                    <div class="player-box" id="p1-select">
                        <h3 style="color: #4cd137;">PLAYER 1</h3>
                        <button class="weapon-btn selected" onclick="selectWeapon(1, 'sword')">
                            <span class="w-name">🗡️ 巨刃大劍</span>
                            <span class="w-desc">傷 12 | 範 85 | 大招：強力擊退</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(1, 'spear')">
                            <span class="w-name">🔱 風暴長槍</span>
                            <span class="w-desc">傷 8 | 範 145 | 大招：穿透突刺</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(1, 'dagger')">
                            <span class="w-name">🩸 劇毒匕首</span>
                            <span class="w-desc">傷 5 | 範 55 | 大招：劇毒扣血</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(1, 'staff')">
                            <span class="w-name">🔮 奧術法杖</span>
                            <span class="w-desc">傷 6 | 射法術彈 | 大招：全屏落雷</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(1, 'shield')">
                            <span class="w-name">🛡️ 荊棘神盾</span>
                            <span class="w-desc">傷 7 | 被動反傷 | 大招：3秒無敵</span>
                        </button>
                    </div>

                    <div class="center-action-box">
                        <button id="start-game-btn" onclick="startGame()">⚔️<br>開戰</button>
                    </div>

                    <div class="player-box" id="p2-select">
                        <h3 style="color: #00a8ff;">PLAYER 2</h3>
                        <button class="weapon-btn selected" onclick="selectWeapon(2, 'sword')">
                            <span class="w-name">🗡️ 巨刃大劍</span>
                            <span class="w-desc">傷 12 | 範 85 | 大招：強力擊退</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(2, 'spear')">
                            <span class="w-name">🔱 風暴長槍</span>
                            <span class="w-desc">傷 8 | 範 145 | 大招：穿透突刺</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(2, 'dagger')">
                            <span class="w-name">🩸 劇毒匕首</span>
                            <span class="w-desc">傷 5 | 範 55 | 大招：劇毒扣血</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(2, 'staff')">
                            <span class="w-name">🔮 奧術法杖</span>
                            <span class="w-desc">傷 6 | 射法術彈 | 大招：全屏落雷</span>
                        </button>
                        <button class="weapon-btn" onclick="selectWeapon(2, 'shield')">
                            <span class="w-name">🛡️ 荊棘神盾</span>
                            <span class="w-desc">傷 7 | 被動反傷 | 大招：3秒無敵</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="ui">
                <div class="player-hud">
                    <div class="hud-meta"><span style="color:#4cd137;">P1 <span id="p1-status" class="state-tag"></span></span><span id="p1-hp-text">100 / 100</span></div>
                    <div class="bar-container">
                        <div id="p1-health-back" class="bar-back"></div>
                        <div id="p1-health" class="bar-front"></div>
                    </div>
                </div>
                <div class="player-hud" style="text-align: right;">
                    <div class="hud-meta"><span id="p2-hp-text">100 / 100</span><span style="color:#00a8ff;"><span id="p2-status" class="state-tag"></span> P2</span></div>
                    <div class="bar-container">
                        <div id="p2-health-back" class="bar-back"></div>
                        <div id="p2-health" class="bar-front"></div>
                    </div>
                </div>
            </div>

            <canvas id="gameCanvas" width="800" height="380"></canvas>

            <div id="game-over-screen" class="hidden">
                <h1 id="winner-text" style="font-size:30px; color:#fbc531; font-weight:900;"></h1>
                <button style="padding: 10px 30px; font-size:18px; font-weight:900; background:#4cd137; border:none; border-radius:6px; color:white; cursor:pointer;" onclick="resetToSelect()">🔄 重新選角</button>
            </div>
        </div>

        <div id="touch-controls" class="menu-active">
            <div class="joystick-container"><div class="joystick-zone" id="p1-joystick-zone"><div class="joystick-knob" id="p1-knob"></div></div></div>
            <div class="action-zone">
                <div class="btn-wrapper"><button class="btn btn-red" id="p1-btn-atk">ATK</button></div>
                <div class="btn-wrapper"><button class="btn btn-yellow" id="p1-btn-skr">SKL</button><div class="cd-overlay" id="p1-skr-cd"></div></div>
            </div>
            <div class="action-zone">
                <div class="btn-wrapper"><button class="btn btn-yellow" id="p2-btn-skr">SKL</button><div class="cd-overlay" id="p2-skr-cd"></div></div>
                <div class="btn-wrapper"><button class="btn btn-red" id="p2-btn-atk">ATK</button></div>
            </div>
            <div class="joystick-container"><div class="joystick-zone" id="p2-joystick-zone"><div class="joystick-knob" id="p2-knob"></div></div></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.55;

        const WEAPON_TYPES = {
            sword:  { range: 85,  height: 50, damage: 12, cooldown: 200, skillCD: 3000,  fxColor: 'rgba(255, 255, 255, 0.6)' },
            spear:  { range: 145, height: 22, damage: 8,  cooldown: 260, skillCD: 4000,  fxColor: 'rgba(230, 126, 34, 0.6)' },
            dagger: { range: 55,  height: 45, damage: 5,  cooldown: 90,  skillCD: 2000,  fxColor: 'rgba(231, 76, 60, 0.7)' },
            staff:  { range: 60,  height: 40, damage: 6,  cooldown: 350, skillCD: 5000,  fxColor: 'rgba(155, 89, 182, 0.6)' },
            shield: { range: 65,  height: 55, damage: 7,  cooldown: 250, skillCD: 6000,  fxColor: 'rgba(52, 152, 219, 0.6)' }
        };

        let gameOver = false;
        let screenShakeTime = 0, screenShakeIntensity = 0;
        let particles = [];
        let projectiles = [];
        let activeRune = null;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 8; this.vy = (Math.random() - 0.5) * 8 - 2;
                this.color = color; this.alpha = 1; this.decay = Math.random() * 0.03 + 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.alpha -= this.decay; }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.restore(); }
        }

        class Projectile {
            constructor(x, y, dir, ownerId) {
                this.x = x; this.y = y; this.vx = dir === 'right' ? 8 : -8;
                this.radius = 8; this.ownerId = ownerId; this.active = true;
            }
            update() { this.x += this.vx; }
            draw() { ctx.fillStyle = '#9c88ff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill(); }
        }

        class Rune {
            constructor() {
                this.x = canvas.width / 2; this.y = canvas.height - 65;
                this.type = Math.random() > 0.5 ? 'dmg' : 'heal'; this.radius = 12; this.pulse = 0;
            }
            draw() {
                this.pulse += 0.1; let r = this.radius + Math.sin(this.pulse) * 3;
                ctx.fillStyle = this.type === 'dmg' ? '#fbc531' : '#4cd137';
                ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(this.type === 'dmg' ? '雙倍' : '治癒', this.x, this.y + 3);
            }
        }

        class Fighter {
            constructor({ x, color, id, weaponType }) {
                this.id = id; this.x = x; this.y = 100; this.vx = 0; this.vy = 0;
                this.baseWidth = 42; this.baseHeight = 85; this.color = color; this.health = 100;
                this.facing = id === 1 ? 'right' : 'left'; this.isAttacking = false; this.attackType = 'normal';
                this.flash = 0; this.scaleX = 1; this.scaleY = 1; this.nextSkillTime = 0;
                this.poisonTicks = 0; this.invincibleUntil = 0; this.dmgBuffUntil = 0;
                this.setWeapon(weaponType);
            }
            setWeapon(type) {
                this.weaponType = type; this.weapon = WEAPON_TYPES[type];
                this.attackBox = { width: this.weapon.range, height: this.weapon.height };
            }
            draw() {
                ctx.save(); let centerX = this.x + this.baseWidth / 2; let centerY = this.y + this.baseHeight;
                ctx.translate(centerX, centerY); ctx.scale(this.scaleX, this.scaleY);
                if (Date.now() < this.invincibleUntil) ctx.fillStyle = '#fbc531';
                else if (this.poisonTicks > 0 && Math.floor(Date.now()/100)%2===0) ctx.fillStyle = '#2cd14d';
                else ctx.fillStyle = this.flash > 0 && Math.floor(this.flash/2)%2===0 ? '#ffffff' : this.color;
                if(this.flash > 0) this.flash--;
                ctx.fillRect(-this.baseWidth/2, -this.baseHeight, this.baseWidth, this.baseHeight);
                ctx.fillStyle = '#0f1115'; ctx.fillRect(this.facing === 'right' ? 10 : -17, -this.baseHeight + 16, 7, 7);
                ctx.restore();
                if (Date.now() < this.dmgBuffUntil) { ctx.strokeStyle = '#fbc531'; ctx.lineWidth = 2; ctx.strokeRect(this.x - 4, this.y - 4, this.baseWidth + 8, this.baseHeight + 8); }
                if (this.isAttacking && this.weaponType !== 'staff') {
                    ctx.save(); let ax = this.facing === 'right' ? this.x + this.baseWidth : this.x - this.attackBox.width; let ay = this.y + 15;
                    let gradient = ctx.createLinearGradient(ax, ay, ax + this.attackBox.width, ay);
                    gradient.addColorStop(this.facing === 'right' ? 0 : 1, this.attackType === 'skill' ? '#9c88ff' : this.weapon.fxColor);
                    gradient.addColorStop(this.facing === 'right' ? 1 : 0, 'rgba(255,255,255,0)');
                    ctx.fillStyle = gradient; ctx.fillRect(ax, ay, this.attackBox.width, this.attackBox.height); ctx.restore();
                }
            }
            update() {
                this.scaleX += (1 - this.scaleX) * 0.15; this.scaleY += (1 - this.scaleY) * 0.15;
                if (Math.abs(this.vx) > 0.5 && this.vy === 0) { this.scaleX = 1.04; this.scaleY = 0.96; }
                this.x += this.vx; this.y += this.vy;
                if (this.y + this.baseHeight + this.vy >= canvas.height - 35) { if (this.vy > 2) { this.scaleX = 1.18; this.scaleY = 0.82; } this.vy = 0; this.y = canvas.height - 35 - this.baseHeight; } else { this.vy += GRAVITY; }
                if (this.x < 0) this.x = 0; if (this.x + this.baseWidth > canvas.width) this.x = canvas.width - this.baseWidth;
                if (this.poisonTicks > 0 && Math.random() < 0.015) { this.takeDamage(1, null, false); this.poisonTicks--; updateHealthUI(); }
                this.draw();
            }
            takeDamage(amount, attacker, canReflect = true) {
                if (Date.now() < this.invincibleUntil) return;
                if (canReflect && this.weaponType === 'shield' && attacker) { attacker.takeDamage(amount * 0.2, null, false); }
                this.health -= amount; this.flash = 10; if (this.health <= 0) this.health = 0;
            }
            attack(type) {
                const now = Date.now();
                if (type === 'skill') {
                    if (now < this.nextSkillTime) return;
                    this.nextSkillTime = now + this.weapon.skillCD;
                    startVisualCD(this.id, this.weapon.skillCD);
                    if (this.weaponType === 'shield') { this.invincibleUntil = now + 3000; triggerScreenShake(4, 2); return; }
                    if (this.weaponType === 'staff') {
                        triggerScreenShake(15, 8); let enemy = this.id === 1 ? player2 : player1;
                        let finalDmg = (now < this.dmgBuffUntil ? 22 : 11); enemy.takeDamage(finalDmg, this);
                        createHitExplosion(enemy.x + 20, enemy.y + 40, '#9c88ff'); updateHealthUI(); 
                        if(enemy.health <= 0) endGame(`PLAYER ${this.id} 贏了！`);
                        return;
                    }
                }
                if (!this.isAttacking) {
                    this.isAttacking = true; this.attackType = type; this.scaleX = 1.15; this.scaleY = 0.9;
                    if (this.weaponType === 'staff' && type === 'normal') {
                        let bx = this.facing === 'right' ? this.x + this.baseWidth + 5 : this.x - 5;
                        projectiles.push(new Projectile(bx, this.y + 30, this.facing, this.id));
                    } else { this.vx += this.facing === 'right' ? 4 : -4; }
                    if (this.weaponType === 'spear' && type === 'skill') { this.vx += this.facing === 'right' ? 12 : -12; this.attackBox.width = this.weapon.range * 1.6; } else { this.attackBox.width = this.weapon.range; }
                    setTimeout(() => { this.isAttacking = false; }, this.weapon.cooldown);
                }
            }
        }

        let player1, player2;
        let p1SelectedWeapon = 'sword', p2SelectedWeapon = 'sword';

        function selectWeapon(pId, type) {
            if(pId === 1) p1SelectedWeapon = type; else p2SelectedWeapon = type;
            event.currentTarget.parentNode.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function startGame() {
            document.getElementById('weapon-select-screen').classList.add('hidden');
            document.getElementById('touch-controls').classList.remove('menu-active');
            
            player1 = new Fighter({ x: 120, color: '#4cd137', id: 1, weaponType: p1SelectedWeapon });
            player2 = new Fighter({ x: 640, color: '#00a8ff', id: 2, weaponType: p2SelectedWeapon });
            gameOver = false; particles = []; projectiles = []; activeRune = null;
            document.getElementById('game-over-screen').classList.add('hidden');
            updateHealthUI();
            animate();
        }

        function startVisualCD(playerId, cdDuration) {
            const overlay = document.getElementById(`p${playerId}-skr-cd`);
            overlay.classList.add('active'); let timeLeft = cdDuration / 1000; overlay.innerText = timeLeft.toFixed(1) + 's';
            let cdInterval = setInterval(() => { timeLeft -= 0.1; if (timeLeft <= 0 || gameOver) { clearInterval(cdInterval); overlay.classList.remove('active'); } else { overlay.innerText = timeLeft.toFixed(1) + 's'; } }, 100);
        }

        function triggerScreenShake(duration, intensity) { screenShakeTime = duration; screenShakeIntensity = intensity; }
        function createHitExplosion(x, y, color) { for(let i=0; i<10; i++) { particles.push(new Particle(x, y, color)); } }

        setInterval(() => { if (!gameOver && !activeRune && player1) activeRune = new Rune(); }, 10000);

        function updateHealthUI() {
            let hp1 = Math.ceil(player1.health); let hp2 = Math.ceil(player2.health);
            document.getElementById('p1-hp-text').innerText = `${hp1} / 100`; document.getElementById('p2-hp-text').innerText = `${hp2} / 100`;
            document.getElementById('p1-health').style.width = hp1 + '%'; document.getElementById('p2-health').style.width = hp2 + '%';
            setTimeout(() => { if(document.getElementById('p1-health-back')) { document.getElementById('p1-health-back').style.width = hp1 + '%'; document.getElementById('p2-health-back').style.width = hp2 + '%'; } }, 150);
            document.getElementById('p1-status').innerText = Date.now() < player1.invincibleUntil ? '🛡️無敵' : (player1.poisonTicks > 0 ? '🤢中毒' : '');
            document.getElementById('p2-status').innerText = Date.now() < player2.invincibleUntil ? '🛡️無敵' : (player2.poisonTicks > 0 ? '🤢中毒' : '');
        }

        function checkHit(att, def) {
            let ax = att.facing === 'right' ? att.x + att.baseWidth : att.x - att.attackBox.width; let ay = att.y + 15;
            return ( ax + att.attackBox.width >= def.x && ax <= def.x + def.baseWidth && ay + att.attackBox.height >= def.y && ay <= def.y + def.baseHeight );
        }

        function animate() {
            if (gameOver) return; window.requestAnimationFrame(animate);
            ctx.save(); if (screenShakeTime > 0) { ctx.translate((Math.random() - 0.5) * screenShakeIntensity, (Math.random() - 0.5) * screenShakeIntensity); screenShakeTime--; }
            let bgGrd = ctx.createLinearGradient(0, 0, 0, canvas.height); bgGrd.addColorStop(0, '#0f1115'); bgGrd.addColorStop(1, '#1b1f27');
            ctx.fillStyle = bgGrd; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#10ac84'; ctx.fillRect(0, canvas.height - 35, canvas.width, 35);

            player1.vx = p1Joystick.dx * 5.5; if(p1Joystick.dx > 0.05) player1.facing = 'right'; if(p1Joystick.dx < -0.05) player1.facing = 'left';
            if(p1Joystick.dy < -0.7 && player1.vy === 0) { player1.vy = -13.5; player1.scaleY = 1.2; player1.scaleX = 0.8; }
            player2.vx = p2Joystick.dx * 5.5; if(p2Joystick.dx > 0.05) player2.facing = 'right'; if(p2Joystick.dx < -0.05) player2.facing = 'left';
            if(p2Joystick.dy < -0.7 && player2.vy === 0) { player2.vy = -13.5; player2.scaleY = 1.2; player2.scaleX = 0.8; }

            if (activeRune) {
                activeRune.draw();
                [player1, player2].forEach(p => {
                    let dx = (p.x + p.baseWidth/2) - activeRune.x; let dy = (p.y + p.baseHeight/2) - activeRune.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 35) { if (activeRune.type === 'heal') p.health = Math.min(100, p.health + 30); else p.dmgBuffUntil = Date.now() + 5000; activeRune = null; triggerScreenShake(4, 3); updateHealthUI(); }
                });
            }

            player1.update(); player2.update();

            projectiles.forEach((proj, idx) => {
                proj.update(); proj.draw(); let target = proj.ownerId === 1 ? player2 : player1;
                if (proj.x > target.x && proj.x < target.x + target.baseWidth && proj.y > target.y && proj.y < target.y + target.baseHeight) {
                    let owner = proj.ownerId === 1 ? player1 : player2; let baseDmg = owner.weapon.damage; let finalDmg = Date.now() < owner.dmgBuffUntil ? baseDmg * 2 : baseDmg;
                    target.takeDamage(finalDmg, owner); createHitExplosion(proj.x, proj.y, '#9c88ff'); projectiles.splice(idx, 1); updateHealthUI();
                    if(target.health <= 0) endGame(`PLAYER ${owner.id} 贏了！`);
                }
                if(proj.x < 0 || proj.x > canvas.width) projectiles.splice(idx, 1);
            });

            if (player1.isAttacking && player1.weaponType !== 'staff' && checkHit(player1, player2)) {
                let isSkill = player1.attackType === 'skill'; let baseDmg = isSkill ? player1.weapon.damage * 1.8 : player1.weapon.damage; let finalDmg = Date.now() < player1.dmgBuffUntil ? baseDmg * 2 : baseDmg;
                player2.takeDamage(finalDmg, player1); createHitExplosion(player2.x + 20, player2.y + 35, '#ff4757');
                if (player1.weaponType === 'sword' && isSkill) player2.vx += player1.facing === 'right' ? 15 : -15;
                if (player1.weaponType === 'dagger' && isSkill) player2.poisonTicks = 5;
                updateHealthUI(); player1.isAttacking = false; if(player2.health <= 0) endGame("PLAYER 1 贏了！");
            }
            if (player2.isAttacking && player2.weaponType !== 'staff' && checkHit(player2, player1)) {
                let isSkill = player2.attackType === 'skill'; let baseDmg = isSkill ? player2.weapon.damage * 1.8 : player2.weapon.damage; let finalDmg = Date.now() < player2.dmgBuffUntil ? baseDmg * 2 : baseDmg;
                player1.takeDamage(finalDmg, player2); createHitExplosion(player1.x + 20, player1.y + 35, '#ff4757');
                if (player2.weaponType === 'sword' && isSkill) player1.vx += player2.facing === 'right' ? 15 : -15;
                if (player2.weaponType === 'dagger' && isSkill) player1.poisonTicks = 5;
                updateHealthUI(); player2.isAttacking = false; if(player1.health <= 0) endGame("PLAYER 2 贏了！");
            }
            particles.forEach((p, idx) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(idx, 1); }); ctx.restore();
        }

        function endGame(txt) { gameOver = true; document.getElementById('game-over-screen').classList.remove('hidden'); document.getElementById('winner-text').innerText = txt; }
        function resetToSelect() { document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('weapon-select-screen').classList.remove('hidden'); document.getElementById('touch-controls').classList.add('menu-active'); }

        class TouchJoystick {
            constructor(zoneId, knobId) {
                this.zone = document.getElementById(zoneId); this.knob = document.getElementById(knobId);
                this.dx = 0; this.dy = 0; this.activeTouchId = null; this.init();
            }
            init() {
                this.zone.addEventListener('touchstart', (e) => { e.preventDefault(); if (this.activeTouchId === null) { let touch = e.changedTouches[0]; this.activeTouchId = touch.identifier; this.handleMove(touch); } }, { passive: false });
                this.zone.addEventListener('touchmove', (e) => { e.preventDefault(); for(let touch of e.touches) { if(touch.identifier === this.activeTouchId) { this.handleMove(touch); break; } } }, { passive: false });
                const stop = (e) => { for(let touch of e.changedTouches) { if(touch.identifier === this.activeTouchId) { this.activeTouchId = null; this.dx = 0; this.dy = 0; this.knob.style.transform = `translate(0px, 0px)`; break; } } };
                this.zone.addEventListener('touchend', stop); this.zone.addEventListener('touchcancel', stop);
            }
            handleMove(touch) {
                let rect = this.zone.getBoundingClientRect(); let deltaX = touch.clientX - (rect.left + rect.width / 2); let deltaY = touch.clientY - (rect.top + rect.height / 2);
                let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY); let maxRadius = rect.width / 2 - 5;
                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; distance = maxRadius; }
                this.knob.style.transform = `translate(${deltaX}px, ${deltaY}px)`; this.dx = deltaX / maxRadius; this.dy = deltaY / maxRadius;
            }
        }

        const p1Joystick = new TouchJoystick('p1-joystick-zone', 'p1-knob');
        const p2Joystick = new TouchJoystick('p2-joystick-zone', 'p2-knob');

        function bindActionButton(id, callback) { document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); callback(); }, { passive: false }); }
        bindActionButton('p1-btn-atk', () => player1.attack('normal')); bindActionButton('p1-btn-skr', () => player1.attack('skill'));
        bindActionButton('p2-btn-atk', () => player2.attack('normal')); bindActionButton('p2-btn-skr', () => player2.attack('skill'));
    </script>
</body>
</html>
