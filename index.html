<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color-profile=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini Brawl Ultra - 全面優化版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d11;
            color: white; font-family: system-ui, -apple-system, sans-serif; text-align: center;
            overflow: hidden; touch-action: none; user-select: none;
            -webkit-user-select: none; -webkit-touch-callout: none;
        }
        
        #game-container { 
            position: relative; 
            display: inline-block; 
            margin-top: 8px; 
            border: 4px solid #2c3e50; 
            background-color: #1a252f; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }
        
        canvas { display: block; }

        /* 👑 頂部 UI：高級極簡血條 */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 15px 25px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0)); pointer-events: none;
            z-index: 5;
        }
        .player-hud { width: 38%; }
        .bar-container { 
            width: 100%; height: 18px; background: #222; border: 2px solid #fff; 
            border-radius: 4px; overflow: hidden; margin-top: 5px; position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }
        /* 雙層血條：底層紅色緩衝，頂層綠/藍 */
        .bar-back { position: absolute; top:0; left:0; height:100%; background: #e74c3c; width: 100%; transition: width 0.4s ease-out; }
        .bar-front { position: absolute; top:0; left:0; height:100%; width: 100%; transition: width 0.08s linear; }
        #p1-health { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        #p2-health { background: linear-gradient(90deg, #2980b9, #3498db); float: right; }
        .weapon-tag { font-size: 13px; color: #f1c40f; font-weight: bold; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; }
        .p-name { font-weight: 900; font-size: 16px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* ⚔️ 高級武器選擇畫面 */
        #weapon-select-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 17, 0.96); z-index: 20; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .select-row { display: flex; gap: 50px; margin: 25px; }
        .player-box { 
            background: #1e272e; padding: 25px; border-radius: 12px; border: 2px solid #3d3d3d; width: 200px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .player-box h3 { margin-top: 0; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .weapon-btn { 
            width: 100%; padding: 14px; font-size: 16px; margin: 8px 0; cursor: pointer; 
            background: #2f3542; color: white; border: 2px solid transparent; border-radius: 8px; 
            font-weight: bold; transition: all 0.2s ease;
        }
        .weapon-btn.selected { background: #ff4757; border-color: #ff6b81; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,71,87,0.4); }
        #start-game-btn { 
            padding: 16px 60px; font-size: 24px; font-weight: 900; background: #2ed573; color: white; 
            border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; 
            box-shadow: 0 6px 15px rgba(46,213,115,0.4); transition: 0.1s;
        }
        #start-game-btn:active { transform: scale(0.95); }

        /* 📱 iPad 極致響應操控區 */
        #touch-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 150px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        
        .joystick-zone { position: absolute; bottom: 15px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); pointer-events: auto; }
        #p1-joystick-zone { left: 30px; }
        #p2-joystick-zone { right: 190px; } 
        
        .joystick-knob { position: absolute; width: 54px; height: 54px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 33px; left: 33px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.6); }
        
        .action-zone { position: absolute; bottom: 20px; display: flex; gap: 15px; pointer-events: auto; }
        #p1-actions { left: 190px; }
        #p2-actions { right: 30px; }

        .btn { width: 62px; height: 62px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); font-size: 16px; font-weight: 900; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.4); text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: transform 0.05s; }
        .btn:active { transform: scale(0.85); opacity: 0.7; }
        .btn-red { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .btn-yellow { background: linear-gradient(135deg, #ffa502, #eccc68); color: #1e272e; }

        /* 🏁 遊戲結束彈窗 */
        #game-over-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,14,0.9); z-index:15; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="weapon-select-screen">
            <h2 style="font-size: 32px; color: #f1c40f; margin-bottom: 5px; font-weight:900; letter-spacing:1px;">⚔️ MINI BRAWL ULTRA ⚔️</h2>
            <p style="color: #778ca3; font-size:15px; margin: 0;">全面優化版：完美多點觸控・絲滑物理打擊感</p>
            <div class="select-row">
                <div class="player-box" id="p1-select">
                    <h3 style="color: #2ecc71;">PLAYER 1</h3>
                    <button class="weapon-btn selected" onclick="selectWeapon(1, 'sword')">大劍 (平衡)</button>
                    <button class="weapon-btn" onclick="selectWeapon(1, 'spear')">長槍 (遠程)</button>
                    <button class="weapon-btn" onclick="selectWeapon(1, 'dagger')">匕首 (刺客)</button>
                </div>
                <div class="player-box" id="p2-select">
                    <h3 style="color: #3498db;">PLAYER 2</h3>
                    <button class="weapon-btn selected" onclick="selectWeapon(2, 'sword')">大劍 (平衡)</button>
                    <button class="weapon-btn" onclick="selectWeapon(2, 'spear')">長槍 (遠程)</button>
                    <button class="weapon-btn" onclick="selectWeapon(2, 'dagger')">匕首 (刺客)</button>
                </div>
            </div>
            <button id="start-game-btn" onclick="startGame()">⚔️ 戰鬥開始 ⚔️</button>
        </div>

        <div id="ui">
            <div class="player-hud" style="text-align: left;">
                <span class="p-name" style="color:#2ecc71;">P1</span> <span id="p1-w-tag" class="weapon-tag"></span>
                <div class="bar-container">
                    <div id="p1-health-back" class="bar-back"></div>
                    <div id="p1-health" class="bar-front"></div>
                </div>
            </div>
            <div class="player-hud" style="text-align: right;">
                <span class="p-name" style="color:#3498db;">P2</span> <span id="p2-w-tag" class="weapon-tag"></span>
                <div class="bar-container">
                    <div id="p2-health-back" class="bar-back"></div>
                    <div id="p2-health" class="bar-front"></div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="430"></canvas>

        <div id="touch-controls">
            <div class="joystick-zone" id="p1-joystick-zone"><div class="joystick-knob" id="p1-knob"></div></div>
            <div class="action-zone" id="p1-actions">
                <button class="btn btn-red" id="p1-btn-atk">ATK</button>
                <button class="btn btn-yellow" id="p1-btn-skr">SKL</button>
            </div>

            <div class="joystick-zone" id="p2-joystick-zone"><div class="joystick-knob" id="p2-knob"></div></div>
            <div class="action-zone" id="p2-actions">
                <button class="btn btn-yellow" id="p2-btn-skr">SKL</button>
                <button class="btn btn-red" id="p2-btn-atk">ATK</button>
            </div>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1 id="winner-text" style="font-size:38px; color:#f1c40f; font-weight:900; text-shadow: 0 4px 15px rgba(241,196,15,0.5);"></h1>
            <button id="start-game-btn" onclick="resetToSelect()">🔄 重新選角</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 📊 全局優化物理系數
        const GRAVITY = 0.55;
        let p1SelectedWeapon = 'sword';
        let p2SelectedWeapon = 'sword';
        let gameOver = false;

        // 💥 特效管理數據
        let screenShakeTime = 0;
        let screenShakeIntensity = 0;
        let particles = [];

        const WEAPON_TYPES = {
            sword:  { name: "大劍", range: 85,  height: 50, damage: 10, cooldown: 180, fxColor: 'rgba(255, 255, 255, 0.55)' },
            spear:  { name: "長槍", range: 145, height: 25, damage: 7,  cooldown: 280, fxColor: 'rgba(230, 126, 34, 0.6)' },
            dagger: { name: "匕首", range: 55,  height: 45, damage: 5,  cooldown: 90,  fxColor: 'rgba(231, 76, 60, 0.65)' }
        };

        // 🎇 粒子爆炸特效類
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.alpha -= this.decay;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); ctx.restore();
            }
        }

        // 🏃 玩家動作優化類（加入果凍變形動畫算法）
        class Fighter {
            constructor({ x, color, id, weaponType }) {
                this.id = id;
                this.x = x; this.y = 100;
                this.vx = 0; this.vy = 0;
                this.baseWidth = 42; this.baseHeight = 85;
                this.width = this.baseWidth; this.height = this.baseHeight;
                this.color = color;
                this.health = 100;
                this.facing = id === 1 ? 'right' : 'left';
                this.isAttacking = false;
                this.attackType = 'normal'; 
                this.flash = 0;
                this.attackProgress = 0; // 用於揮刀動畫流暢度

                // 動態拉伸縮放（果凍感）
                this.scaleX = 1; this.scaleY = 1;

                this.setWeapon(weaponType);
            }

            setWeapon(type) {
                this.weapon = WEAPON_TYPES[type];
                this.attackBox = { width: this.weapon.range, height: this.weapon.height };
            }

            draw() {
                ctx.save();
                // 核心優化：基於角色中心點進行柔和的縮放變形
                let centerX = this.x + this.baseWidth / 2;
                let centerY = this.y + this.baseHeight;
                ctx.translate(centerX, centerY);
                ctx.scale(this.scaleX, this.scaleY);

                ctx.fillStyle = this.flash > 0 && Math.floor(this.flash/2)%2===0 ? '#ffffff' : this.color;
                if(this.flash > 0) this.flash--;
                
                // 畫出變形後的方塊主體
                ctx.fillRect(-this.baseWidth/2, -this.baseHeight, this.baseWidth, this.baseHeight);

                // 畫眼睛
                ctx.fillStyle = '#0d0d11';
                let eyeOffset = this.facing === 'right' ? 10 : -17;
                ctx.fillRect(eyeOffset, -this.baseHeight + 16, 7, 7);
                ctx.restore();

                // 🌟 優化：繪製帶漸變的武器斬擊特效
                if (this.isAttacking) {
                    ctx.save();
                    let ax = this.facing === 'right' ? this.x + this.baseWidth : this.x - this.attackBox.width;
                    let ay = this.y + 15;
                    
                    let gradient = ctx.createLinearGradient(ax, ay, ax + this.attackBox.width, ay);
                    if (this.attackType === 'skill') {
                        gradient.addColorStop(0, 'rgba(155, 89, 182, 0.8)');
                        gradient.addColorStop(1, 'rgba(155, 89, 182, 0)');
                    } else {
                        gradient.addColorStop(this.facing === 'right' ? 0 : 1, this.weapon.fxColor);
                        gradient.addColorStop(this.facing === 'right' ? 1 : 0, 'rgba(255,255,255,0)');
                    }
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(ax, ay, this.attackBox.width, this.attackBox.height);
                    ctx.restore();
                }
            }

            update() {
                // 柔和恢復果凍彈性物理數值
                this.scaleX += (1 - this.scaleX) * 0.15;
                this.scaleY += (1 - this.scaleY) * 0.15;

                // 根據行走速度微微產生左右傾斜/拉伸效果
                if (Math.abs(this.vx) > 0.5 && this.vy === 0) {
                    this.scaleX = 1.05; this.scaleY = 0.95;
                }

                this.x += this.vx; this.y += this.vy;

                // 地面碰撞與落地果凍式壓縮衝擊
                if (this.y + this.baseHeight + this.vy >= canvas.height - 35) {
                    if (this.vy > 2) { // 剛剛落地
                        this.scaleX = 1.2; this.scaleY = 0.8; // 向下壓縮
                    }
                    this.vy = 0; this.y = canvas.height - 35 - this.baseHeight;
                } else { 
                    this.vy += GRAVITY; 
                }

                if (this.x < 0) this.x = 0;
                if (this.x + this.baseWidth > canvas.width) this.x = canvas.width - this.baseWidth;

                this.draw();
            }

            attack(type) {
                if (!this.isAttacking) {
                    this.isAttacking = true;
                    this.attackType = type;
                    
                    // 突刺/大招時角色往前衝、拉伸方塊
                    this.scaleX = 1.2; this.scaleY = 0.9;
                    this.vx += this.facing === 'right' ? 4 : -4;

                    if(type === 'skill') { 
                        this.attackBox.width = this.weapon.range * 1.5; 
                        triggerScreenShake(6, 4); // 大招自帶小震屏
                    } else { 
                        this.attackBox.width = this.weapon.range; 
                    }

                    setTimeout(() => { this.isAttacking = false; }, this.weapon.cooldown);
                }
            }
        }

        let player1, player2;

        function selectWeapon(pId, type) {
            if(pId === 1) p1SelectedWeapon = type;
            else p2SelectedWeapon = type;
            event.currentTarget.parentNode.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function startGame() {
            document.getElementById('weapon-select-screen').classList.add('hidden');
            document.getElementById('p1-w-tag').innerText = `${WEAPON_TYPES[p1SelectedWeapon].name}`;
            document.getElementById('p2-w-tag').innerText = `${WEAPON_TYPES[p2SelectedWeapon].name}`;
            
            player1 = new Fighter({ x: 150, color: '#2ecc71', id: 1, weaponType: p1SelectedWeapon });
            player2 = new Fighter({ x: 600, color: '#3498db', id: 2, weaponType: p2SelectedWeapon });
            
            gameOver = false;
            particles = [];
            document.getElementById('game-over-screen').classList.add('hidden');
            updateHealthUI();
            
            animate();
        }

        function triggerScreenShake(duration, intensity) {
            screenShakeTime = duration; screenShakeIntensity = intensity;
        }

        function createHitExplosion(x, y, color) {
            for(let i=0; i<15; i++) { particles.push(new Particle(x, y, color)); }
        }

        function checkHit(att, def) {
            let ax = att.facing === 'right' ? att.x + att.baseWidth : att.x - att.attackBox.width;
            let ay = att.y + 15;
            return (
                ax + att.attackBox.width >= def.x && ax <= def.x + def.baseWidth &&
                ay + att.attackBox.height >= def.y && ay <= def.y + def.baseHeight
            );
        }

        function updateHealthUI() {
            document.getElementById('p1-health').style.width = Math.max(0, player1.health) + '%';
            document.getElementById('p2-health').style.width = Math.max(0, player2.health) + '%';
            // 延遲同步紅條
            setTimeout(() => {
                if(document.getElementById('p1-health-back')) {
                    document.getElementById('p1-health-back').style.width = Math.max(0, player1.health) + '%';
                    document.getElementById('p2-health-back').style.width = Math.max(0, player2.health) + '%';
                }
            }, 150);
        }

        function animate() {
            if (gameOver) return;
            window.requestAnimationFrame(animate);

            ctx.save();
            // 🎬 核心優化：打擊感震屏效果矩陣運算
            if (screenShakeTime > 0) {
                let dx = (Math.random() - 0.5) * screenShakeIntensity;
                let dy = (Math.random() - 0.5) * screenShakeIntensity;
                ctx.translate(dx, dy); screenShakeTime--;
            }

            // 繪製順滑漸變背景
            let bgGrd = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrd.addColorStop(0, '#1e272e'); bgGrd.addColorStop(1, '#2f3542');
            ctx.fillStyle = bgGrd; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 繪製高級地面
            ctx.fillStyle = '#2ed573'; ctx.fillRect(0, canvas.height - 35, canvas.width, 35); 
            ctx.fillStyle = '#26af5f'; ctx.fillRect(0, canvas.height - 35, canvas.width, 4); // 地面高光邊

            // 【P1 控制流暢化解算】
            player1.vx = p1Joystick.dx * 6;
            if(p1Joystick.dx > 0.05) player1.facing = 'right';
            if(p1Joystick.dx < -0.05) player1.facing = 'left';
            if(p1Joystick.dy < -0.7 && player1.vy === 0) { player1.vy = -14; player1.scaleY = 1.2; player1.scaleX = 0.8; } // 跳躍拉長

            // 【P2 控制流暢化解算】
            player2.vx = p2Joystick.dx * 6;
            if(p2Joystick.dx > 0.05) player2.facing = 'right';
            if(p2Joystick.dx < -0.05) player2.facing = 'left';
            if(p2Joystick.dy < -0.7 && player2.vy === 0) { player2.vy = -14; player2.scaleY = 1.2; player2.scaleX = 0.8; }

            player1.update();
            player2.update();

            // 命中判定（加上火花粒子、強烈震屏、卡肉時間感）
            if (player1.isAttacking && checkHit(player1, player2)) {
                let isCrit = player1.attackType === 'skill';
                let dmg = isCrit ? player1.weapon.damage * 2.2 : player1.weapon.damage;
                player2.health -= dmg; player2.flash = 12;
                player2.scaleX = 0.8; player2.scaleY = 1.1; // 被打扁
                
                triggerScreenShake(isCrit ? 12 : 6, isCrit ? 8 : 4);
                createHitExplosion(player2.x + 20, player2.y + 30, '#ff4757');
                updateHealthUI();
                player1.isAttacking = false;
                if(player2.health <= 0) endGame("PLAYER 1 (綠色) 贏了！");
            }
            
            if (player2.isAttacking && checkHit(player2, player1)) {
                let isCrit = player2.attackType === 'skill';
                let dmg = isCrit ? player2.weapon.damage * 2.2 : player2.weapon.damage;
                player1.health -= dmg; player1.flash = 12;
                player1.scaleX = 0.8; player1.scaleY = 1.1;
                
                triggerScreenShake(isCrit ? 12 : 6, isCrit ? 8 : 4);
                createHitExplosion(player1.x + 20, player1.y + 30, '#ff4757');
                updateHealthUI();
                player2.isAttacking = false;
                if(player1.health <= 0) endGame("PLAYER 2 (藍色) 贏了！");
            }

            // 更新並繪製爆炸粒子
            particles.forEach((p, idx) => {
                p.update(); p.draw(); if(p.alpha <= 0) particles.splice(idx, 1);
            });

            ctx.restore();
        }

        function endGame(txt) { gameOver = true; document.getElementById('game-over-screen').classList.remove('hidden'); document.getElementById('winner-text').innerText = txt; }
        function resetToSelect() { document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('weapon-select-screen').classList.remove('hidden'); }

        // 🕹️ 極致響應：高級多點觸控拉桿重寫（完美解鎖斷觸問題）
        class TouchJoystick {
            constructor(zoneId, knobId) {
                this.zone = document.getElementById(zoneId);
                this.knob = document.getElementById(knobId);
                this.dx = 0; this.dy = 0; 
                this.activeTouchId = null;
                this.init();
            }
            init() {
                this.zone.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.activeTouchId === null) {
                        let touch = e.changedTouches[0]; this.activeTouchId = touch.identifier; this.handleMove(touch);
                    }
                }, { passive: false });
                
                this.zone.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    for(let touch of e.touches) {
                        if(touch.identifier === this.activeTouchId) { this.handleMove(touch); break; }
                    }
                }, { passive: false });
                
                const stop = (e) => {
                    for(let touch of e.changedTouches) {
                        if(touch.identifier === this.activeTouchId) {
                            this.activeTouchId = null; this.dx = 0; this.dy = 0; this.knob.style.transform = `translate(0px, 0px)`; break;
                        }
                    }
                };
                this.zone.addEventListener('touchend', stop); this.zone.addEventListener('touchcancel', stop);
            }
            handleMove(touch) {
                let rect = this.zone.getBoundingClientRect();
                let centerX = rect.left + rect.width / 2; let centerY = rect.top + rect.height / 2;
                let deltaX = touch.clientX - centerX; let deltaY = touch.clientY - centerY;
                let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                let maxRadius = rect.width / 2 - 8; 

                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; distance = maxRadius; }
                this.knob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                this.dx = deltaX / maxRadius; this.dy = deltaY / maxRadius; 
            }
        }

        const p1Joystick = new TouchJoystick('p1-joystick-zone', 'p1-knob');
        const p2Joystick = new TouchJoystick('p2-joystick-zone', 'p2-knob');

        function bindActionButton(id, callback) {
            let el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); callback(); }, { passive: false });
        }
        bindActionButton('p1-btn-atk', () => player1.attack('normal'));
        bindActionButton('p1-btn-skr', () => player1.attack('skill'));
        bindActionButton('p2-btn-atk', () => player2.attack('normal'));
        bindActionButton('p2-btn-skr', () => player2.attack('skill'));
    </script>
</body>
